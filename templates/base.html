{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>
{% block title %}FinTrack{% endblock %}
</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet" href="{% static 'css/dashboard.css' %}">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
<style>

body{

background:#eef2f7;

font-family:'Segoe UI',sans-serif;

overflow-x:hidden;

}

.sidebar{

position:fixed;

left:0;

top:0;

width:260px;

height:100vh;

background:linear-gradient(180deg,#0d6efd,#4f46e5);

padding-top:25px;

box-shadow:5px 0 20px rgba(0,0,0,.15);

}

.logo{

color:white;

font-size:28px;

font-weight:bold;

text-align:center;

margin-bottom:35px;

}

.sidebar a{

display:flex;

align-items:center;

gap:12px;

padding:14px 22px;

color:white;

text-decoration:none;

transition:.3s;

font-size:16px;

}

.sidebar a:hover{

background:rgba(255,255,255,.15);

padding-left:30px;

}

.topbar{

margin-left:260px;

height:70px;

background:white;

display:flex;

justify-content:space-between;

align-items:center;

padding:0 30px;

box-shadow:0 2px 10px rgba(0,0,0,.08);

}

.content{

margin-left:260px;

padding:30px;

}

.card{

border:none;

border-radius:15px;

box-shadow:0 10px 25px rgba(0,0,0,.08);

transition:.3s;

}

.card:hover{

transform:translateY(-5px);

}

.user{

font-weight:bold;

}

@media(max-width:768px){

.sidebar{

width:80px;

}

.sidebar span{

display:none;

}

.topbar{

margin-left:80px;

}

.content{

margin-left:80px;

}

}

</style>

</head>

<body>

<div class="sidebar">

<div class="logo">

<i class="fa-solid fa-wallet"></i>

FinTrack

</div>

<a href="{% url 'dashboard' %}">
<i class="fa-solid fa-chart-line"></i>
<span>Dashboard</span>
</a>

<a href="{% url 'add_transaction' %}">
<i class="fa-solid fa-plus"></i>
<span>Add Transaction</span>
</a>

<a href="{% url 'transaction_history' %}">
<i class="fa-solid fa-clock-rotate-left"></i>
<span>Transactions</span>
</a>

<a href="{% url 'categorize_transactions' %}">
<i class="fa-solid fa-tags"></i>
<span>Categories</span>
</a>

<a href="{% url 'gst_report' %}">
<i class="fa-solid fa-file-invoice"></i>
<span>GST Report</span>
</a>

<a href="{% url 'analytics' %}">
<i class="fa-solid fa-robot"></i>
<span>AI Analytics</span>
</a>

</div>

<div class="topbar">

<h4 class="mb-0">
{% block page_title %}{% endblock %}
</h4>

<div class="user">

<i class="fa-solid fa-circle-user"></i>

Admin

</div>

</div>

<div class="content">

{% block content %}

{% endblock %}

</div>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</body>

</html>
